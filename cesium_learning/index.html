<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Include the CesiumJS JavaScript and CSS files -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.143/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.143/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script type="module">
    // Incolla qui il tuo token Cesium ion (gratuito): https://ion.cesium.com/tokens
    // Il token e' client-side ma personale: NON committare quello vero su un repo pubblico.
    Cesium.Ion.defaultAccessToken = 'YOUR_CESIUM_ION_TOKEN';

    // Initialize the Cesium Viewer in the HTML element with the `cesiumContainer` ID.
    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),
    });

    // === CMCC 3D Tiles (dalla nostra pipeline IFC -> CityJSON -> 3D Tiles) ===
    const cmccTileset = await Cesium.Cesium3DTileset.fromUrl('from_gis_to_bim_to_webmap/tiles/tileset.json');
    viewer.scene.primitives.add(cmccTileset);

    // FIX temporaneo: l'IFC ha OrthogonalHeight=0, ma il terreno a Caserta
    // sta a ~100m di quota ELLISSOIDICA (geoide ~48m + quota ~65m) ->
    // alziamo il tileset lungo la verticale locale.
    // Fix definitivo: scrivere la quota ellissoidica corretta in
    // IfcMapConversion.OrthogonalHeight alla fonte (Bonsai) e rigenerare.
    // NOTA per la specifica dimostratori: una quota dichiarata deve sempre
    // dire RISPETTO A COSA (ellissoide WGS84 vs livello del mare).
    const offset = 100.0;
    const center = cmccTileset.boundingSphere.center;
    const normal = Cesium.Cartesian3.normalize(center, new Cesium.Cartesian3());
    const translation = Cesium.Cartesian3.multiplyByScalar(normal, offset, new Cesium.Cartesian3());
    cmccTileset.modelMatrix = Cesium.Matrix4.fromTranslation(translation);

    // === DIAGNOSTICA (spenta): bounding volume del tileset ===
    // Riattivare quando serve capire se un tileset e' posizionato ma invisibile
    // (facce/normali) o proprio assente (transform).
    // cmccTileset.debugShowBoundingVolume = true;

    // Zoom automatico sull'oggetto: inquadra il bounding volume del tileset,
    // ovunque esso sia. HeadingPitchRange = (direzione, inclinazione, distanza m).
    await viewer.zoomTo(
      cmccTileset,
      new Cesium.HeadingPitchRange(0, Cesium.Math.toRadians(-35), 250)
    );

    // --- COMMENTATA: vista su coordinate fisse ---
    // Utile in DEBUG: con zoomTo la camera segue il tileset ovunque sia
    // finito (anche nel posto sbagliato) e non te ne accorgi; con la camera
    // inchiodata sulle coordinate vere di Caserta, cio' che vedi e' la verita'.
    // Riattivarla (e commentare zoomTo) quando si diagnostica la posizione.
    // viewer.camera.flyTo({
    //   destination: Cesium.Cartesian3.fromDegrees(14.357699114486747, 41.04984402056693, 200),
    //   orientation: {
    //     heading: Cesium.Math.toRadians(0.0),
    //     pitch: Cesium.Math.toRadians(-30.0),
    //   }
    // });

    // --- RIMOSSO: Cesium OSM Buildings ---
    // Il layer globale degli edifici OSM coprirebbe/affiancherebbe il nostro
    // modello (incluso il volume OSM del CMCC stesso, quello con
    // estimatedHeight=3 visto settimane fa). Per ora vogliamo vedere SOLO
    // l'edificio dalla nostra pipeline. Da riattivare quando servira' il
    // contesto urbano attorno ai dimostratori.
    // const buildingTileset = await Cesium.createOsmBuildingsAsync();
    // viewer.scene.primitives.add(buildingTileset);
  </script>
</body>
</html>
